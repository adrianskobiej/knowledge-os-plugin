<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Defense-in-depth: block <base> hijack, plugins/embeds and form exfil (no forms/objects are used). -->
<meta http-equiv="Content-Security-Policy" content="object-src 'none'; base-uri 'none'; form-action 'none'">
<title>Knowledge base</title>
<script src="kb-data.js"></script>
<style>
  :root {
    --bg: #fbfbfa; --panel: #fff; --ink: #1f2328; --muted: #6a737d;
    --line: #e6e6e4; --accent: #2f6feb; --broken: #d1242f; --chip: #eef1f4;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#1a1b1e; --panel:#222428; --ink:#e6e6e6; --muted:#9aa0a6;
            --line:#33363b; --accent:#6ea8fe; --broken:#ff7b72; --chip:#2c2f34; }
  }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
         background:var(--bg); color:var(--ink); display:flex; height:100vh; }
  #side { width:320px; flex-shrink:0; border-right:1px solid var(--line);
          background:var(--panel); display:flex; flex-direction:column; }
  #brand { padding:16px 18px; border-bottom:1px solid var(--line); }
  #brand b { font-size:15px; } #brand span { display:block; color:var(--muted); font-size:12px; margin-top:2px; }
  #search { margin:12px; padding:8px 11px; border:1px solid var(--line); border-radius:8px;
            background:var(--bg); color:var(--ink); font-size:14px; }
  #tree { overflow:auto; padding:0 8px 24px; flex:1; }
  .cat { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted);
         margin:16px 10px 6px; font-weight:600; }
  .item { padding:6px 10px; border-radius:7px; cursor:pointer; font-size:14px; }
  .item:hover { background:var(--chip); }
  .item.active { background:var(--accent); color:#fff; }
  .item small { display:block; color:var(--muted); font-size:11.5px; overflow:hidden;
                text-overflow:ellipsis; white-space:nowrap; }
  .item.active small { color:rgba(255,255,255,.85); }
  #main { flex:1; overflow:auto; padding:40px 56px 80px; }
  #main .wrap { max-width:760px; margin:0 auto; }
  .meta { color:var(--muted); font-size:13px; margin:-8px 0 24px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .chip { background:var(--chip); padding:2px 9px; border-radius:20px; font-size:12px; }
  .chip.auth { background:transparent; border:1px solid var(--line); color:var(--muted); }
  .status-draft { color:#bf8700; }
  article h1 { font-size:30px; margin:0 0 4px; }
  article h2 { font-size:21px; margin:32px 0 10px; border-bottom:1px solid var(--line); padding-bottom:5px; }
  article h3 { font-size:17px; margin:24px 0 8px; }
  article a { color:var(--accent); }
  article code { background:var(--chip); padding:1px 6px; border-radius:5px; font-size:.88em; }
  article pre { background:var(--chip); padding:14px 16px; border-radius:9px; overflow:auto; }
  article pre code { background:none; padding:0; }
  article blockquote { border-left:3px solid var(--line); margin:0; padding:2px 16px; color:var(--muted); }
  .wikilink.broken { color:var(--broken); text-decoration:line-through; }
  .backlinks { margin-top:48px; padding-top:18px; border-top:1px solid var(--line); }
  .backlinks h4 { font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:0 0 8px; }
  .backlinks a { display:inline-block; margin:0 8px 6px 0; }
  #empty { color:var(--muted); text-align:center; margin-top:80px; }
</style>
</head>
<body>
  <nav id="side">
    <div id="brand"><b id="co-name">Knowledge base</b><span id="co-meta"></span></div>
    <input id="search" placeholder="Search… (title, summary, tag)">
    <div id="tree"></div>
  </nav>
  <main id="main"><div class="wrap" id="content"><div id="empty">Pick an article from the list ←</div></div></main>

<script>
(function () {
  const D = window.KB_DATA || { articles: [], company: {}, briefs: [] };
  D.briefs = D.briefs || [];
  const bySlug = Object.fromEntries(D.articles.map(a => [a.slug, a]));
  const byBrief = Object.fromEntries(D.briefs.map(b => [b.path, b]));
  document.getElementById('co-name').textContent = (D.company && D.company.name) || 'Knowledge base';
  document.getElementById('co-meta').textContent =
    D.articles.length + ' articles · ' + (D.generatedAt || '').slice(0, 10);

  const tree = document.getElementById('tree');
  function buildTree(filter) {
    tree.innerHTML = '';
    const f = (filter || '').toLowerCase();
    // Briefs (data room) — pinned at the top
    const briefs = D.briefs.filter(b => !f || (b.title + ' ' + b.folder).toLowerCase().includes(f));
    if (briefs.length) {
      const h = document.createElement('div'); h.className = 'cat'; h.textContent = '📋 Briefs'; tree.appendChild(h);
      for (const b of briefs.sort((x, y) => x.folder.localeCompare(y.folder))) {
        const el = document.createElement('div');
        el.className = 'item'; el.dataset.brief = b.path;
        el.innerHTML = '<div>' + escapeHtml(b.folder) + '</div><small>' + escapeHtml(b.title) + '</small>';
        el.onclick = () => { location.hash = 'brief:' + encodeURIComponent(b.path); };
        tree.appendChild(el);
      }
    }
    // Recently updated — only in the unfiltered view
    if (!f) {
      const recent = D.articles.filter(a => a.updated)
        .sort((x, y) => (y.updated || '').localeCompare(x.updated || '')).slice(0, 5);
      if (recent.length) {
        const h = document.createElement('div'); h.className = 'cat'; h.textContent = '🕒 Recently updated'; tree.appendChild(h);
        for (const a of recent) {
          const el = document.createElement('div');
          el.className = 'item'; el.dataset.slug = a.slug;
          el.innerHTML = '<div>' + escapeHtml(a.title) + '</div><small>' + escapeHtml(a.updated) + '</small>';
          el.onclick = () => { location.hash = a.slug; };
          tree.appendChild(el);
        }
      }
    }
    const groups = {};
    for (const a of D.articles) {
      const hay = (a.title + ' ' + a.summary + ' ' + (a.author || '') + ' ' + a.status + ' ' + (a.tags || []).join(' ')).toLowerCase();
      if (f && !hay.includes(f)) continue;
      (groups[a.path.split('/')[0]] ??= []).push(a);
    }
    for (const cat of Object.keys(groups).sort()) {
      const h = document.createElement('div'); h.className = 'cat'; h.textContent = cat; tree.appendChild(h);
      for (const a of groups[cat].sort((x, y) => x.title.localeCompare(y.title))) {
        const el = document.createElement('div');
        el.className = 'item'; el.dataset.slug = a.slug;
        el.innerHTML = '<div>' + escapeHtml(a.title) + '</div><small>' + escapeHtml(a.summary) + '</small>';
        el.onclick = () => { location.hash = a.slug; };
        tree.appendChild(el);
      }
    }
  }
  function escapeHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  function show(slug) {
    const a = bySlug[slug];
    const c = document.getElementById('content');
    if (!a) { c.innerHTML = '<div id="empty">Not found: ' + escapeHtml(slug) + '</div>'; return; }
    let meta = '<div class="meta"><span class="status-' + a.status + '">' + a.status + '</span>';
    if (a.updated) meta += '<span>· upd. ' + a.updated + '</span>';
    if (a.authority) meta += '<span class="chip auth">⟨' + escapeHtml(a.authority) + '⟩</span>';
    if (a.author) meta += '<span class="chip">by ' + escapeHtml(a.author) + '</span>';
    if (a.source) meta += '<span class="chip">source: ' + escapeHtml(a.source) + '</span>';
    for (const t of (a.tags || [])) meta += '<span class="chip">' + escapeHtml(t) + '</span>';
    meta += '</div>';
    let back = '';
    if (a.backlinks && a.backlinks.length) {
      back = '<div class="backlinks"><h4>Linked from here</h4>' +
        a.backlinks.map(s => '<a href="#' + escapeHtml(s) + '">' + escapeHtml((bySlug[s] || {}).title || s) + '</a>').join('') + '</div>';
    }
    c.innerHTML = '<article><h1>' + escapeHtml(a.title) + '</h1>' + meta + a.html + back + '</article>';
    document.querySelectorAll('.item').forEach(e => e.classList.toggle('active', e.dataset.slug === slug));
    document.getElementById('main').scrollTop = 0;
  }

  function showBrief(path) {
    const b = byBrief[path];
    const c = document.getElementById('content');
    if (!b) { c.innerHTML = '<div id="empty">Brief not found</div>'; return; }
    c.innerHTML = '<article><div class="meta"><span class="chip auth">📋 brief</span><span>' +
      escapeHtml(b.folder) + '</span></div>' + b.html + '</article>';
    document.querySelectorAll('.item').forEach(e => e.classList.toggle('active', e.dataset.brief === path));
    document.getElementById('main').scrollTop = 0;
  }
  function route() {
    const raw = location.hash.slice(1);
    if (!raw) return;
    if (raw.startsWith('brief:')) showBrief(decodeURIComponent(raw.slice(6)));
    else show(decodeURIComponent(raw));
  }

  document.getElementById('search').addEventListener('input', e => buildTree(e.target.value));
  window.addEventListener('hashchange', route);

  buildTree('');
  if (location.hash) route();
  else if (D.articles[0]) location.hash = D.articles[0].slug;
})();
</script>
</body>
</html>
