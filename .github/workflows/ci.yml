name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18.x', '20.x', '22.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      # Zero runtime dependencies — nothing to install.
      - name: Syntax check
        run: npm run lint
      - name: Unit + integration tests
        run: npm test
      - name: Template stamps and lints clean
        run: cd template && node scripts/reindex.mjs --lint

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Secret scan
        run: node scripts/check-secrets.mjs
